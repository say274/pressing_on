<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>The Goal</title>
  <link rel="icon" type="image/png" href="favi.png">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-dark: #100e0c;
      --bg-dark-2: #15120f;
      --text-main: #f3ede4;
      --text-soft: #e7d9c7;
      --card-bg: rgba(245, 236, 220, 0.08);
      --card-border: rgba(255, 240, 220, 0.18);
      --line: rgba(255, 240, 220, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text-main);

      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;

      font-family: "Cormorant Garamond", serif;
      text-align: center;
      padding: 2rem 1rem 4.5rem;

      background:
        linear-gradient(rgba(16, 14, 12, 0.82), rgba(16, 14, 12, 0.94)),
        url("paper-texture.jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      position: relative;
      overflow-x: hidden;
    }

    /* subtle editorial border */
    body::before {
      content: "";
      position: fixed;
      inset: 14px;
      border: 1px solid rgba(255, 245, 230, 0.09);
      border-radius: 22px;
      pointer-events: none;
      box-shadow:
        inset 0 0 0 1px rgba(255, 245, 230, 0.025),
        0 0 0 1px rgba(0, 0, 0, 0.08);
    }

    .content {
      max-width: 820px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.3rem;
      z-index: 1;
    }

    .fade-in {
      opacity: 0;
      animation: fadeIn 1.8s ease forwards;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .page-title {
      font-family: "Playfair Display", serif;
      font-size: clamp(2.5rem, 5.3vw, 3.8rem);
      font-style: italic;
      font-weight: 400;
      letter-spacing: 0.05em;
      color: #f7f1e8;
      margin: 0 0 0.2rem;
      text-shadow: 0 1px 1px rgba(0, 0, 0, 0.18);
    }

    .verse-card {
      max-width: 720px;
      width: min(92vw, 720px);
      padding: 1.6rem 1.6rem 1.3rem;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(3px);
      -webkit-backdrop-filter: blur(3px);
    }

    blockquote {
      margin: 0;
      font-family: "Playfair Display", serif;
      font-size: clamp(1.35rem, 2.9vw, 2rem);
      line-height: 1.55;
      font-style: italic;
      color: #f6efe5;
    }

    .reference {
      margin-top: 1rem;
      font-size: clamp(1rem, 2vw, 1.2rem);
      letter-spacing: 0.05em;
      color: rgba(243, 237, 228, 0.88);
    }

    .subline {
      font-size: clamp(1.35rem, 2.5vw, 1.75rem);
      letter-spacing: 0.03em;
      color: var(--text-soft);
      margin-top: 0.15rem;
    }

    .image-wrap {
      width: 100%;
      display: flex;
      justify-content: center;
      margin-top: 0.2rem;
    }

    img {
      max-width: min(92vw, 780px);
      max-height: 64vh;
      border-radius: 18px;
      box-shadow: 0 22px 55px rgba(0, 0, 0, 0.55);
      object-fit: cover;
      border: 1px solid rgba(255, 240, 220, 0.12);
      opacity: 0;
      transition: opacity 0.8s ease;
      background: rgba(255,255,255,0.03);
    }

    button {
      margin-top: 0.15rem;
      padding: 0.72rem 1.55rem;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.055);
      color: #f1e7da;
      font-family: "Cormorant Garamond", serif;
      font-size: 1rem;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: all 0.25s ease;
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
    }

    button:hover {
      background: rgba(255, 255, 255, 0.11);
      transform: translateY(-1px);
    }

    .monogram {
      position: fixed;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.78rem;
      letter-spacing: 0.35em;
      color: rgba(255, 255, 255, 0.5);
      font-family: "Cormorant Garamond", serif;
      z-index: 1;
    }

    @media (max-width: 600px) {
      body {
        padding: 1.5rem 0.85rem 4rem;
      }

      body::before {
        inset: 10px;
        border-radius: 18px;
      }

      .verse-card {
        padding: 1.25rem 1.1rem 1.05rem;
      }

      img {
        max-height: 56vh;
      }
    }
  </style>
</head>

<body>
  <div class="content fade-in">
    <h1 class="page-title">The Goal</h1>

    <div class="verse-card">
      <blockquote>
        “I press on toward the goal to win the prize for which God has called me heavenward in Christ Jesus.”
      </blockquote>
      <div class="reference">— Philippians 3:14</div>
    </div>

    <div class="subline">Strength for the road ahead</div>

    <div class="image-wrap">
      <img id="image" alt="Encouraging Scripture graphic" />
    </div>

    <button onclick="loadRandom()">Another page</button>
  </div>

  <div class="monogram">S · H</div>

  <script>
    const totalImages = 33;

    function loadRandom() {
      const randomNumber = Math.floor(Math.random() * totalImages) + 1;
      const img = document.getElementById("image");

      img.style.opacity = 0;

      img.onload = () => {
        img.style.opacity = 1;
      };

      img.src = `images/the-goal${randomNumber}.jpg?v=${Date.now()}`;
    }

    loadRandom();
  </script>
</body>
</html>
