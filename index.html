<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />

<title>The Goal</title>
<link rel="icon" type="image/png" href="favi.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">

<style>

:root{
  --text-main:#f3ede4;
  --text-soft:#e7d9c7;
}

/* PAGE */

body{
  margin:0;
  min-height:100vh;
  color:var(--text-main);

  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;

  font-family:"Cormorant Garamond",serif;
  text-align:center;
  padding:2rem 1rem 4rem;

  background:
    radial-gradient(circle at top, rgba(255,235,205,0.08), transparent 40%),
    linear-gradient(rgba(16,14,12,0.82),rgba(16,14,12,0.94)),
    url("paper-texture.jpg");

  background-size:cover;
  background-position:center;
}

/* subtle editorial frame */

body::before{
  content:"";
  position:fixed;
  inset:14px;
  border:1px solid rgba(255,245,230,0.08);
  border-radius:22px;
  pointer-events:none;
}

/* CONTENT */

.content{
  max-width:820px;
  width:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:1.2rem;
}

/* TITLE */

.page-title{
  font-family:"Playfair Display",serif;
  font-size:clamp(2.4rem,5vw,3.5rem);
  font-style:italic;
  font-weight:400;
  letter-spacing:.05em;
}

/* VERSE CARD */

.verse-card{
  max-width:720px;
  width:min(92vw,720px);

  padding:1.6rem 1.6rem 1.3rem;

  background:rgba(245,236,220,.08);
  border:1px solid rgba(255,240,220,.18);

  border-radius:20px;
  box-shadow:0 18px 45px rgba(0,0,0,.35);
}

/* VERSE TYPOGRAPHY */

blockquote{
  margin:0 auto;
  max-width:38ch;

  font-family:"Playfair Display",serif;
  font-size:clamp(1.1rem,2.1vw,1.4rem);
  line-height:1.7;
  font-style:italic;

  text-indent:-0.45em;
  padding-left:.45em;
}

.reference{
  margin-top:.7rem;
  font-size:.95rem;
  letter-spacing:.08em;
  color:rgba(243,237,228,.7);
}

/* SUBLINE */

.subline{
  font-size:clamp(1.35rem,2.5vw,1.7rem);
  color:var(--text-soft);
}

/* IMAGE */

img{
  max-width:min(92vw,780px);
  max-height:64vh;

  border-radius:18px;
  box-shadow:0 22px 55px rgba(0,0,0,.55);

  object-fit:cover;
  border:1px solid rgba(255,240,220,.12);

  opacity:0;
  transition:opacity .8s ease;
}

/* BUTTON */

button{
  padding:.7rem 1.5rem;

  border-radius:999px;
  border:1px solid rgba(255,255,255,.18);

  background:rgba(255,255,255,.05);
  color:#f1e7da;

  font-family:"Cormorant Garamond",serif;
  font-size:1rem;

  cursor:pointer;
}

button:hover{
  background:rgba(255,255,255,.12);
}

/* BOTTOM DEDICATION */

.dedication-bottom{
  position:fixed;
  bottom:50px;
  left:50%;
  transform:translateX(-50%);

  font-family:"Cormorant Garamond",serif;
  font-size:clamp(1rem,2vw,1.15rem);
  color:rgba(243,237,228,.85);

  text-align:center;
}

.dedication-bottom p{
  margin:.15rem 0;
}

/* MONOGRAM */

.monogram{
  position:fixed;
  bottom:18px;
  left:50%;
  transform:translateX(-50%);
  font-size:.75rem;
  letter-spacing:.35em;
  color:rgba(255,255,255,.55);
}

/* FADE IN */

.fade-in{
  opacity:0;
  animation:fadeIn 1.8s ease forwards;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(8px);}
  to{opacity:1; transform:translateY(0);}
}

</style>
</head>

<body>

<div class="content fade-in">

<h1 class="page-title">The Goal</h1>

<div class="verse-card">

<blockquote>
“I press on toward the goal to win the prize for which God has called me heavenward in Christ Jesus.”
</blockquote>

<div class="reference">— Philippians 3:14</div>

</div>

<div class="subline">Strength for the road ahead</div>

<img id="image" alt="Encouraging Scripture graphic">

<button onclick="loadRandom()">Another page</button>

</div>

<div class="dedication-bottom">
<p>Michelle,</p>
<p>Where words fall short, thank you.</p>
</div>

<div class="monogram">S · H</div>

<script>

const totalImages = 33;

function loadRandom(){

  const randomNumber =
  Math.floor(Math.random()*totalImages)+1;

  const img=document.getElementById("image");

  img.style.opacity=0;

  img.onload=()=>{
    img.style.opacity=1;
  };

  img.src=
  `images/the-goal${randomNumber}.jpg?v=${Date.now()}`;

}

loadRandom();

</script>

</body>
</html>
